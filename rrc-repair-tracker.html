<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>1991 Range Rover Classic — Repair Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');

  :root{
    --paper:#eeeae1;
    --card:#f7f4ec;
    --ink:#26241f;
    --ink-soft:#5b574d;
    --rule:#c9c2b1;
    --orange:#c85a1e;
    --orange-deep:#8f3f14;
    --yellow:#c99b2e;
    --green:#4b6b3f;
    --green-deep:#324a2a;
    --steel:#454742;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    padding:0;
  }
  .sheet{
    max-width:820px;
    margin:0 auto;
    padding:28px 26px 60px;
  }
  .ticket-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    border-bottom:3px solid var(--ink);
    padding-bottom:14px;
    margin-bottom:6px;
  }
  .ticket-head h1{
    font-family:'Oswald',sans-serif;
    font-weight:600;
    letter-spacing:.03em;
    text-transform:uppercase;
    font-size:26px;
    margin:0;
  }
  .ticket-head .sub{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--ink-soft);
    margin-top:4px;
  }
  .ticket-no{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--ink-soft);
    text-align:right;
    line-height:1.6;
  }
  .ticket-no b{color:var(--ink);}

  .progress-row{
    display:flex;
    align-items:center;
    gap:14px;
    margin:18px 0 26px;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--ink-soft);
  }
  .progress-track{
    flex:1;
    height:8px;
    background:var(--rule);
    border-radius:0;
    position:relative;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:var(--orange);
    width:0%;
    transition:width .3s ease;
  }

  .leftoff{
    border:1.5px dashed var(--orange-deep);
    background:#f6e9dc;
    padding:14px 16px;
    margin-bottom:26px;
  }
  .leftoff-label{
    font-family:'Oswald',sans-serif;
    font-size:12px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--orange-deep);
    margin-bottom:8px;
    font-weight:600;
  }
  .leftoff textarea{
    width:100%;
    min-height:52px;
    resize:vertical;
    border:1px solid var(--rule);
    background:#fffdf8;
    font-family:'Inter',sans-serif;
    font-size:14px;
    color:var(--ink);
    padding:8px 10px;
    line-height:1.5;
  }
  .leftoff-meta{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    margin-top:6px;
  }

  .project{
    background:var(--card);
    border:1px solid var(--rule);
    margin-bottom:18px;
  }
  .project-head{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 16px;
    cursor:pointer;
    border-bottom:1px solid transparent;
    user-select:none;
  }
  .project.open .project-head{
    border-bottom:1px solid var(--rule);
  }
  .project-num{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    background:var(--paper);
    border:1px solid var(--rule);
    padding:2px 6px;
    flex-shrink:0;
  }
  .project-title{
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:16px;
    letter-spacing:.02em;
    flex:1;
  }
  .project-status{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    flex-shrink:0;
  }
  .project-chevron{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:var(--ink-soft);
    transition:transform .2s;
    flex-shrink:0;
  }
  .project.open .project-chevron{transform:rotate(90deg);}

  .project-body{display:none;padding:4px 16px 16px;}
  .project.open .project-body{display:block;}

  .task{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:9px 4px;
    border-bottom:1px solid var(--rule);
  }
  .task:last-child{border-bottom:none;}
  .task input[type=checkbox]{
    appearance:none;
    -webkit-appearance:none;
    width:17px;
    height:17px;
    border:1.5px solid var(--steel);
    background:#fffdf8;
    flex-shrink:0;
    margin-top:2px;
    cursor:pointer;
    position:relative;
  }
  .task input[type=checkbox]:checked{
    background:var(--green);
    border-color:var(--green-deep);
  }
  .task input[type=checkbox]:checked::after{
    content:'';
    position:absolute;
    left:5px;top:1px;
    width:4px;height:9px;
    border:solid #fffdf8;
    border-width:0 2px 2px 0;
    transform:rotate(45deg);
  }
  .task-text{
    flex:1;
    font-size:14px;
    line-height:1.5;
  }
  .task.done .task-text{
    color:var(--ink-soft);
    text-decoration:line-through;
    text-decoration-color:var(--rule);
  }
  .task-time{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    flex-shrink:0;
    padding-top:2px;
    white-space:nowrap;
  }
  .task-note{
    font-size:12.5px;
    color:var(--ink-soft);
    margin-top:2px;
    line-height:1.4;
  }

  .footer-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:8px;
  }
  .reset-btn{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    background:none;
    border:1px solid var(--rule);
    padding:6px 10px;
    cursor:pointer;
  }
  .reset-btn:hover{border-color:var(--orange-deep);color:var(--orange-deep);}
  .save-state{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
  }
</style>
</head>
<body>
<div class="sheet">
  <div class="ticket-head">
    <div>
      <h1>Repair work order</h1>
      <div class="sub">1991 Range Rover Classic Vogue SE — 3.9L V8</div>
    </div>
    <div class="ticket-no">
      <div>WO <b>#RRC-91-01</b></div>
      <div id="date-opened">opened —</div>
    </div>
  </div>

  <div class="progress-row">
    <span id="progress-label">0 / 0 tasks</span>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <span id="progress-pct">0%</span>
  </div>

  <div class="leftoff">
    <div class="leftoff-label">Where I left off</div>
    <textarea id="leftoff-text" placeholder="e.g. Got the fan nut to crack loose, ran out of time before pulling the fan clutch itself. Rag is still jammed in the belt."></textarea>
    <div class="leftoff-meta" id="leftoff-meta">not saved yet</div>
  </div>

  <div id="projects"></div>

  <div class="footer-row">
    <span class="save-state" id="save-state">loading…</span>
    <button class="reset-btn" id="reset-btn">reset tracker</button>
  </div>
</div>

<script>
const DATA = [
  {
    id: "cooling",
    title: "1. Water pump + coolant flush",
    tasks: [
      { t: "Remove viscous fan & clutch (32mm wrench, RH thread — turn same direction fan spins; jam rag in belt to hold pulley, sharp hammer strike to break free)", m: 45 },
      { t: "Remove fan shroud", m: 20 },
      { t: "Drain coolant (radiator petcock + engine block drains)", m: 20 },
      { t: "Remove serpentine/fan belt and any brackets blocking pump access", m: 30 },
      { t: "Unbolt old water pump, scrape old gasket off mating surfaces", m: 40 },
      { t: "Fit new pump with new gasket (torque bolts evenly, small increments)", m: 30 },
      { t: "Reinstall fan clutch, shroud, and belt", m: 30 },
      { t: "Refill coolant, bleed air (heater on, top up as level drops)", m: 30 },
      { t: "Run engine to temp, check for leaks, recheck level once cool", m: 30 }
    ]
  },
  {
    id: "abs",
    title: "2. ABS system",
    tasks: [
      { t: "Pull ABS fault codes (self-diagnostic blink codes — no OBD-II on a '91)", m: 30 },
      { t: "Inspect wiring/connectors at all 4 wheel speed sensors", m: 45 },
      { t: "Check ABS modulator/pump unit for fluid weeping or corrosion", m: 30 },
      { t: "Clean or replace faulty wheel speed sensor(s)", m: 45 },
      { t: "Repair any damaged wiring/connectors found", m: 45 },
      { t: "Clear codes, road test, confirm ABS light stays off", m: 20 }
    ]
  },
  {
    id: "oil",
    title: "3. Oil change & fluid service",
    tasks: [
      { t: "Warm engine, drain oil", m: 20 },
      { t: "Replace oil filter", m: 15 },
      { t: "Refill with correct grade oil", m: 15 },
      { t: "Check/top power steering, brake, diff, and transfer case fluids", m: 30 },
      { t: "Run engine, inspect for new leaks around drain plug and filter", m: 15 }
    ]
  },
  {
    id: "electrical",
    title: "4. Electrical systems (diagnose next)",
    tasks: [
      { t: "Test battery and charging system output", m: 20 },
      { t: "Check main chassis/engine grounds (classic weak point on these trucks)", m: 30 },
      { t: "Inspect fuse box for corrosion/heat damage", m: 20 },
      { t: "Note and list specific symptoms to diagnose (add below as found)", m: 15 }
    ]
  }
];

const STORAGE_KEY = "rrc-91-tracker-state";
let state = { checked: {}, leftoff: "", openedDate: null };
let projectsOpen = { cooling: true };

function taskKey(pid, idx){ return pid + ":" + idx; }

function render(){
  const container = document.getElementById("projects");
  container.innerHTML = "";
  let total = 0, done = 0;

  DATA.forEach(project => {
    const projTasks = project.tasks.length;
    let projDone = 0;
    project.tasks.forEach((_, i) => { if(state.checked[taskKey(project.id,i)]) projDone++; });
    total += projTasks; done += projDone;

    const div = document.createElement("div");
    div.className = "project" + (projectsOpen[project.id] ? " open" : "");

    const head = document.createElement("div");
    head.className = "project-head";
    head.innerHTML = `
      <span class="project-chevron">&#9656;</span>
      <span class="project-title">${project.title}</span>
      <span class="project-status">${projDone}/${projTasks}</span>
    `;
    head.addEventListener("click", () => {
      projectsOpen[project.id] = !projectsOpen[project.id];
      render();
    });

    const body = document.createElement("div");
    body.className = "project-body";
    project.tasks.forEach((task, i) => {
      const key = taskKey(project.id, i);
      const checked = !!state.checked[key];
      const row = document.createElement("div");
      row.className = "task" + (checked ? " done" : "");
      row.innerHTML = `
        <input type="checkbox" ${checked ? "checked" : ""} />
        <div class="task-text">${task.t}</div>
        <div class="task-time">~${task.m} min</div>
      `;
      row.querySelector("input").addEventListener("change", (e) => {
        state.checked[key] = e.target.checked;
        save();
        render();
      });
      body.appendChild(row);
    });

    div.appendChild(head);
    div.appendChild(body);
    container.appendChild(div);
  });

  document.getElementById("progress-label").textContent = `${done} / ${total} tasks`;
  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById("progress-pct").textContent = pct + "%";
  document.getElementById("progress-fill").style.width = pct + "%";
}

async function save(){
  document.getElementById("save-state").textContent = "saving…";
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(state), false);
    document.getElementById("save-state").textContent = "saved";
  }catch(e){
    document.getElementById("save-state").textContent = "save failed — check connection";
  }
}

async function load(){
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    if(res && res.value){
      state = JSON.parse(res.value);
    }
  }catch(e){
    // no saved state yet
  }
  if(!state.openedDate){
    state.openedDate = new Date().toISOString().slice(0,10);
    save();
  }
  document.getElementById("date-opened").textContent = "opened " + state.openedDate;
  document.getElementById("leftoff-text").value = state.leftoff || "";
  document.getElementById("save-state").textContent = "saved";
  render();
}

let leftoffTimer;
document.getElementById("leftoff-text").addEventListener("input", (e) => {
  state.leftoff = e.target.value;
  document.getElementById("leftoff-meta").textContent = "typing…";
  clearTimeout(leftoffTimer);
  leftoffTimer = setTimeout(() => {
    save();
    document.getElementById("leftoff-meta").textContent = "saved just now";
  }, 600);
});

document.getElementById("reset-btn").addEventListener("click", () => {
  if(confirm("Clear all checked tasks and notes? This can't be undone.")){
    state = { checked: {}, leftoff: "", openedDate: new Date().toISOString().slice(0,10) };
    save();
    document.getElementById("leftoff-text").value = "";
    document.getElementById("leftoff-meta").textContent = "saved just now";
    render();
  }
});

load();
</script>
</body>
</html>
